<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 420">
  <defs>
    <style>
      .title { font: 700 16px 'SF Mono', 'PingFang SC', sans-serif; fill: #1a1a1a; text-anchor: middle; }
      .label { font: 500 10px 'SF Mono', 'Menlo', 'Monaco', monospace; fill: #666; text-anchor: middle; letter-spacing: 0.5px; }
      .box-text { font: 600 13px 'SF Mono', 'PingFang SC', sans-serif; fill: #1a1a1a; text-anchor: middle; }
      .sublabel { font: 500 9px 'SF Mono', 'PingFang SC', sans-serif; fill: #64748b; text-anchor: middle; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#666"/>
    </marker>
    <marker id="arrow-rev" markerWidth="10" markerHeight="7" refX="1" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#666"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="420" fill="#fff"/>

  <!-- Title -->
  <text x="340" y="30" class="title">LLM 操作系统类比</text>
  <text x="340" y="47" class="label">LLM OS ARCHITECTURE</text>

  <!-- Center: LLM = CPU (largest box) -->
  <rect x="220" y="165" width="240" height="80" fill="#ede9fe" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="340" y="198" class="box-text">LLM = CPU</text>
  <text x="340" y="216" class="sublabel">推理引擎 / INFERENCE ENGINE</text>

  <!-- Top: Context Window = RAM -->
  <rect x="220" y="62" width="240" height="60" fill="#dbeafe" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="340" y="88" class="box-text">Context Window = RAM</text>
  <text x="340" y="105" class="sublabel">工作记忆 / WORKING MEMORY</text>

  <!-- Bottom: Vector DB = Disk -->
  <rect x="220" y="288" width="240" height="60" fill="#d1fae5" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="340" y="314" class="box-text">Vector DB = Disk</text>
  <text x="340" y="331" class="sublabel">持久存储 / PERSISTENT STORAGE</text>

  <!-- Left: Tools = Peripherals -->
  <rect x="30" y="175" width="140" height="60" fill="#fce7f3" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="100" y="201" class="box-text">Tools</text>
  <text x="100" y="218" class="sublabel">外设 / PERIPHERALS</text>

  <!-- Right: API = Network -->
  <rect x="510" y="175" width="140" height="60" fill="#fef3c7" stroke="#1a1a1a" stroke-width="1.5" rx="3"/>
  <text x="580" y="201" class="box-text">API / LLM</text>
  <text x="580" y="218" class="sublabel">网络 / NETWORK I/O</text>

  <!-- Arrow: Center ↔ Top (bidirectional) -->
  <line x1="310" y1="165" x2="310" y2="130" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="130" x2="370" y2="165" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Center ↔ Bottom -->
  <line x1="310" y1="245" x2="310" y2="280" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="280" x2="370" y2="245" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Center ↔ Left -->
  <line x1="220" y1="195" x2="178" y2="195" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="178" y1="215" x2="220" y2="215" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Center ↔ Right -->
  <line x1="460" y1="195" x2="502" y2="195" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="502" y1="215" x2="460" y2="215" stroke="#666" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Annotations -->
  <text x="340" y="380" class="sublabel">对话结束 = 断电 → RAM (上下文) 全部清零</text>
  <text x="340" y="398" class="sublabel">这就是为什么需要上下文工程</text>
</svg>
